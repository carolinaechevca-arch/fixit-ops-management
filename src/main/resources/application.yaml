server:
  port: 8080

spring:
  application:
    name: fixit-ops-management
  main:
    banner-mode: console
  datasource:
    url: jdbc:postgresql://localhost:5432/fixit_db
    username: ${USERNAME:postgres}
    password: ${PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

logging:
  level:
    org.springdoc: DEBUG